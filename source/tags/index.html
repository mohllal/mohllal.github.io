---
layout: tags
pagination:
  enabled: true
---

<section class="tags-list">
  {% if site.tags.size == 0 %}
  <h2>No tags found</h2>
  {% endif %}

  <div class="tags-label-list">
    <ul class="label">
      {% for tag in site.tags %}
      <li>
        <a href="#{{ tag[0] }}">
          <span>#{{ tag[0] }}</span>
          <span class="count">{{ tag[1] | size }}</span>
        </a>
      </li>
      {% endfor %}
    </ul>

    {% for tag in site.tags %}
    {% include tag.html %}
    {% endfor %}
  </div>
</section>
