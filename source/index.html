---
layout: default
---

<section class="hero">
  <div class="hero-inner">
    <div class="container">
      <img src="{{ site.me.thumb | prepend: site.baseurl }}" alt="me thumb" class="dot">
      <h3>I'm <strong itemprop="name">{{ site.me.name }}</strong>, a <em itemprop="jobTitle">{{ site.me.job }}</em>.</h3>
      <h3>{{ site.me.bio }}</h3>
      <a href="{{ '/about' | prepend: site.baseurl }}" class="button button-ghost" title="about">about</a>
      <a href="{{ '/blog' | prepend: site.baseurl }}" class="button button-ghost" title="blog">blog</a>
      <a href="{{ '/resume/KareemKhaledResume.pdf' | prepend: site.baseurl }}" class="button button-ghost" title="resume">resume</a>
      {% include social.html %}
    </div>
  </div>
</section>
