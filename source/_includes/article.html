<article class="post">
  <div class="post-content">
    <header class="post-header">
      <h1 class="post-title">
        <a class="post-link" href="{{ post.url | prepend: site.baseurl }}">{{ post.title }}</a>
      </h1>
      <em class="post-meta">
        <time>{{ post.date | date: "%b %-d, %Y" }}</time>
      </em>

      <div class="post-tags">
        {% for tag in post.tags %}
        <a class="tag-header" href="{{ site.url }}{{ site.baseurl }}/tags#{{ tag }}">
          #{{ tag }}
        </a>
        {% endfor %}
      </div>
    </header>
    <p>{{ post.content | strip_html | truncatewords: 30 }}</p>
    <p><a href="{{ post.url | prepend: site.baseurl }}" title="Permalink to: {{ post.title }}"><span class="read-more">read more...</span></a></p>
  </div>
</article>
