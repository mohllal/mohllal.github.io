---
layout: pages
---

<article role="article" class="post">

  <div class="card">
    <header class="post-header">
      <h1 class="post-title">{{ page.title }}</h1>
      <em class="post-meta">
        <time>{{ page.date | date: "%b %-d, %Y" }}{% if page.me %} • {{ page.me }}{% endif %}{% if page.meta %} • {{ page.meta }}{% endif %}</time>
      </em>

      <div class="post-tags">
        {% for tag in page.tags %}
          <a class="tag-header" href="{{ site.url }}{{ site.baseurl }}/tags#{{ tag }}">
            #{{ tag }}
          </a>
        {% endfor %}
      </div>
    </header>

    <div class="post-content">
        {{ content }}
    </div>

    {% include comments.html %}
  </div>

</article>
